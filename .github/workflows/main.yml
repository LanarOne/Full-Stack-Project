name: Test

on: push

jobs:
  test:
    runs-on: ubuntu-22.04
    env:
      DATABASE_URL: ${{secrets.DATABASE_URL}}
      TOKEN_KEY: ${{secrets.TOKEN_KEY}}
      TEST_DATABASE_URL: ${{vars.TEST_DATABASE_URL}}
      TOKEN_EXPIRES_IN: ${{vars.TOKEN_EXPIRES_IN}}
      PASSWORD_COST: ${{secrets.PASSWORD_COST}}


    services:
      postgres:
        image: postgres:16.1-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: household_app
        ports:
            - 5432:5432

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Type check server
        run: npm run typecheck -w server

      - name: Lint server
        run: npm run lint -w server

      - name: Lint client
        run: npm run lint -w client

      - name: Run migrations
        run: npm run migrate:latest -w server

      - name: Run server tests
        run: npm run test -w server

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Build front end for E2E tests
        run: npm run build -w client

      - name: Test client E2E
        run: npm run test:e2e -w client

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: client/playwright-report/
          retention-days: 7

  build-deploy:
    needs: test
    runs-on: ubuntu-22.04
    if: github.ref == 'refs/heads/main'
    env:
      CLIENT_IMAGE_TAG: client-${{github.sha}}
      SERVER_IMAGE_TAG: server-${{github.sha}}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{vars.AWS_REGION}}
          aws-access-key-id: ${{secrets.AWS_ACCESS_KEY_ID}}
          aws-secret-access-key: ${{secrets.AWS_SECRET_ACCESS_KEY}}

      - name: Install Lightsail CLI helper
        run: |
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip awscliv2.zip
          sudo ./aws/install --bin-dir /usr/local/bin --install-dir /usr/local/aws-cli --update
          sudo curl "https://s3.us-west-2.amazonaws.com/lightsailctl/linux-amd64/lightsailctl" -o "/usr/local/bin/lightsailctl"
          sudo chmod +x /usr/local/bin/lightsailctl

      - name: Build server image
        run: docker build -t $SERVER_IMAGE_TAG -f ./server/Dockerfile .

      - name: Build client image
        run: docker build --build-arg VITE_API_PATH=/api/v1/trpc -t $CLIENT_IMAGE_TAG -f ./client/Dockerfile .

      - name: Push server image
        run: aws lightsail push-container-image --service-name ${{vars.AWS_LIGHTSAIL_SERVICE}} --label $SERVER_IMAGE_TAG --image $SERVER_IMAGE_TAG --output yaml

      - name: Push client image
        run: aws lightsail push-container-image --service-name ${{vars.AWS_LIGHTSAIL_SERVICE}} --label $CLIENT_IMAGE_TAG --image $CLIENT_IMAGE_TAG --output yaml

      - name: Resolve Lightsail image names
        run: |
          aws lightsail get-container-images --service-name ${{ vars.AWS_LIGHTSAIL_SERVICE }} | jq -r '.containerImages[] | select(.image | contains(".'$SERVER_IMAGE_TAG'")) | .image'
          echo "LIGHTSAIL_SERVER_IMAGE=$(aws lightsail get-container-images --service-name ${{vars.AWS_LIGHTSAIL_SERVICE}} | jq -r '.containerImages[] | select(.image | contains(".'$SERVER_IMAGE_TAG'")) | .image')" >> $GITHUB_ENV
          echo "LIGHTSAIL_CLIENT_IMAGE=$(aws lightsail get-container-images --service-name ${{vars.AWS_LIGHTSAIL_SERVICE}} | jq -r '.containerImages[] | select(.image | contains(".'$CLIENT_IMAGE_TAG'")) | .image')" >> $GITHUB_ENV

      - name: Create containers.json
        run: |
          echo '{
          "client": {
            "image": "${{env.LIGHTSAIL_CLIENT_IMAGE}}",
            "command": [],
            "ports": {
              "80": "HTTP"
            },
            "environment": {
              "API_PROXY_PASS": "http://localhost:3000"
            }
          },
          "server": {
            "image": "${{env.LIGHTSAIL_SERVER_IMAGE}}",
            "ports": {
              "3000":"HTTP"
            },
            "environment": {
              "NODE_ENV": "production",
              "PORT": "3000",
              "DATABASE_URL": "${{secrets.DATABASE_URL}}",
              "TOKEN_KEY": "${{secrets.TOKEN_KEY}}",
              "TOKEN_EXPIRES_IN": "${{vars.TOKEN_EXPIRES_IN}}",
              "PASSWORD_COST": "${{vars.PASSWORD_COST}}"
              }
            }
          }' > containers.json

      - name: Create public-endpoint.json
        run: |
          echo '{
            "containerName": "client",
            "containerPort": 80,
            "healthCheck": {
              "intervalSeconds": 15,
              "path": "/",
              "successCodes": "200-499"
            }
          }' > public-endpoint.json

      - name: Deploy to Lightsail
        run: |
          aws lightsail create-container-service-deployment \
            --region eu-west-3 \
            --service-name ${{vars.AWS_LIGHTSAIL_SERVICE}} \
            --containers file://containers.json \
            --public-endpoint file://public-endpoint.json