name: Test

on: push

jobs:
  test:
    runs-on: ubuntu-22.04
    env:
      DATABASE_URL: postgresql://neondb_owner:npg_k7ETtR6QevHr@ep-wandering-mud-ablp8wmv-pooler.eu-west-2.aws.neon.tech/neondb?sslmode=require&channel_binding=require
      TOKEN_KEY: b4ckd4f*ckup1312
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/household_app
      TOKEN_EXPIRES_IN: 24h
      PASSWORD_COST: 12


    services:
      postgres:
        image: postgres:16.1-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: household_app
        ports:
            - 5432:5432

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Type check server
        run: npm run typecheck -w server

      - name: Lint server
        run: npm run lint -w server

      - name: Lint client
        run: npm run lint -w client

      - name: Run migrations
        run: npm run migrate:latest -w server

      - name: Run server tests
        run: npm run test -w server

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Build front end for E2E tests
        run: npm run build -w client

      - name: Test client E2E
        run: npm run test:e2e -w client

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: client/playwright-report/
          retention-days: 7