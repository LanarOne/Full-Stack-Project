services:
  postgres:
    image: postgres:16.10-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: household_app

    ports:
      - "5432:5432"

    volumes:
      - household-app:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d household_app"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  server:
    build:
      context: .
      dockerfile: ./server/Dockerfile

    env_file:
      - ./server/.env
    environment:
      NODE_ENV: development
      DATABASE_URL: ${DATABASE_URL}
      PORT: 3000


    ports:
      - "3000:3000"

    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  client:
    build:
      context: .
      dockerfile: ./client/Dockerfile

    env_file:
      - ./client/.env

    ports:
      - "3001:80"

    depends_on:
      - server

volumes:
  household-app: